name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install Dependencies
        run: uv sync --locked

      - name: Verify Framework Lock
        run: |
          uv run python - <<'PY'
          from pathlib import Path
          from src.framework.security.framework_lock import verify_manifest

          result = verify_manifest(
              manifest_path=Path("configs/framework_lock.json"),
              project_root=Path("."),
          )
          if not result["ok"]:
              print("Framework lock verification failed")
              print(result)
              raise SystemExit(1)
          print(
              "Framework lock verification passed: "
              f"{result['verified_file_count']}/{result['manifest_file_count']}"
          )
          PY

      - name: Run Test Suite
        run: uv run pytest -q
