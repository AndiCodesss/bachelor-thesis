playbook:
  path: "Fabio Valentini's Modern Meta Scalping.txt"

strategy:
  type: modern_meta
  bar_type: volume
  vol_threshold: 2000
  tick_threshold: 610
  stop_ticks: 12
  pt_ticks: 40
  time_stop: 3
  signal:
    enable_trap_setup: true
    enable_break_setup: false
    trap_require_power_hour: true
    trap_require_cvd_divergence: true
    trap_require_extreme_aggression: true
    trap_min_poc_distance: 0.5
  signal_by_bar_type:
    tick:
      trap_min_poc_distance: 1.5
  risk_by_bar_type:
    tick:
      stop_ticks: 20

backtest:
  max_daily_loss: 1000.0
