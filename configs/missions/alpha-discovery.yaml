mission_name: alpha-discovery
objective: "Search train split for robust, event-driven NQ scalp candidates that survive validate selection"
started_at: "2026-02-18T00:00:00Z"

bar_configs:
  - tick_610
search_split: train
selection_split: validate
promotion_split: test
session_filter: eth  # ETH = extended trading hours; use ETH cache for this run
feature_group: all  # "ohlcv" for Group A, "all" for Group B (OHLCV + MBP1)

target_sharpe: 1.5
min_trade_count: 30

selection_gate:
  require_gauntlet: true
  target_sharpe: 1.25
  min_trade_count: 20

max_experiments: 400
max_runtime_hours: 6
kill_criteria:
  FAIL: 200
  ERROR: 30

advanced_validation:
  min_dsr_probability: 0.10
  allowed_alpha_decay_verdicts:
    - STABLE
    - NOISY
    - INSUFFICIENT_DATA
  allowed_factor_verdicts:
    - PURE_ALPHA
    - ALPHA_WITH_BETA_EXPOSURE
    - INSUFFICIENT_DATA

notebooklm:
  mode: lane_fresh
  required: true
  title_prefix: "NQ Alpha Discovery"
  iteration_query_budget:
    max_total_queries: 3
    max_research_queries: 1
    max_deep_research_queries: 0
  research_guidance: "Use high-quality trusted sources. Prefer exchanges, academic papers, execution research, market-structure research, and serious technical references. Avoid low-signal forum chatter, script marketplaces, and recycled summaries."

current_focus:
  - "AMT value area rejection and rotation (VAH/VAL/POC mean-reversion)"
  - "AMT initial balance breakout and failed breakout fades"
  - "Sequential state machine patterns: arm on condition A, fire on condition B"
  - "Orderflow divergence reversals (fade delta extremes, not follow them)"
  - "Volatility compression → expansion ignition"
