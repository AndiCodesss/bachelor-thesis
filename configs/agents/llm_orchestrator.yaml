provider: claude_cli

claude_cli:
  binary: claude
  timeout_seconds: 480
  retries: 2
  retry_backoff_seconds: 1.5
  # Keep this on the latest frontier Opus via alias + high reasoning effort.
  extra_args:
    - --effort
    - high

feedback_analyst:
  model: claude-sonnet-4-6
  temperature: 0.1
  max_output_tokens: 1400

quant_thinker:
  model: opus
  temperature: 0.2
  max_output_tokens: 2000

coder:
  model: claude-sonnet-4-6
  temperature: 0.2
  max_output_tokens: 2600

runtime:
  max_iterations: 200
  max_pending_tasks: 25
  poll_seconds: 10
  max_runtime_hours: 6
  stage_max_attempts: 3
  json_repair_attempts: 1
  semantic_retry_attempts: 1
  stage_backoff_seconds: 3
  quota_backoff_seconds: 20
  max_backoff_seconds: 90
  max_code_repair_attempts: 2  # retry coder with injected errors on validation failure; set 0 to disable
